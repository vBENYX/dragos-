
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE P7 STELLANTIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 1);
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease-in-out;
        }

        .apple-logo {
            font-size: 3.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.05em;
            opacity: 0;
            transform: scale(0.9);
            animation: appleIn 1.2s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes appleIn { to { opacity: 1; transform: scale(1); } }
        
        .main-content { opacity: 0; transition: opacity 0.5s ease-in; }
        .active-glow { box-shadow: 0 0 30px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-[#f5f5f7] min-h-screen pb-20">

    <div id="splash-screen">
        <div class="apple-logo tracking-tighter">CODE</div>
        <div class="text-[#888] text-sm mt-4 font-medium tracking-[0.3em] opacity-0 animate-[fadeIn_1s_0.6s_forwards]">P7 STELLANTIS</div>
    </div>

    <div id="app-content" class="main-content">
        <nav class="bg-black text-white p-5 sticky top-0 z-50">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="font-extrabold text-xl tracking-tighter">CODE</span>
                    <span class="text-[10px] font-medium text-slate-400 border-l border-slate-700 pl-3 tracking-widest uppercase">P7 Stellantis</span>
                </div>
                <button id="btn-change-shift" class="hidden text-[10px] font-bold bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition-all uppercase tracking-wider">
                    Cambiar Turno
                </button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 space-y-6">

            <!-- Configuration / Change Shift -->
            <section id="setup-section" class="glass-card rounded-3xl p-8 shadow-sm">
                <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-6">Registro de Entrada / Turno</h2>
                <form id="setup-form" class="space-y-4">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Nombre del Operario</label>
                            <input type="text" id="user-name" required placeholder="Ingresa tu nombre" 
                                class="w-full p-4 bg-slate-100 border-transparent border rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all font-semibold">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Camión</label>
                                <input type="text" id="truck-plate" required placeholder="Matrícula" 
                                    class="w-full p-4 bg-slate-100 border-transparent border rounded-2xl focus:ring-2 focus:ring-black outline-none uppercase font-mono transition-all">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Remolque</label>
                                <input type="text" id="trailer-plate" placeholder="Matrícula R" 
                                    class="w-full p-4 bg-slate-100 border-transparent border rounded-2xl focus:ring-2 focus:ring-black outline-none uppercase font-mono transition-all">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all">
                        Iniciar Jornada
                    </button>
                </form>
            </section>

            <!-- Dashboard Info -->
            <div id="dashboard-info" class="hidden glass-card rounded-2xl p-4 flex justify-between items-center text-[11px] font-bold uppercase text-slate-500 bg-white/50">
                <div class="flex flex-col">
                    <span class="text-[9px] text-slate-400">Operario</span>
                    <span id="info-user" class="text-black"></span>
                </div>
                <div class="flex flex-col border-l pl-4">
                    <span class="text-[9px] text-slate-400">Entrada</span>
                    <span id="info-shift-start" class="text-black font-mono"></span>
                </div>
                <div class="flex flex-col border-l pl-4">
                    <span class="text-[9px] text-slate-400">Vehículo</span>
                    <span id="info-vehicle" class="text-black font-mono"></span>
                </div>
            </div>

            <!-- Active Trip Tracking -->
            <div id="active-trip-container" class="hidden">
                <div class="bg-white border border-indigo-100 rounded-[2rem] p-8 shadow-xl active-glow relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-6">
                        <div class="flex items-center gap-2 bg-indigo-50 text-indigo-600 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase">
                            <span class="w-2 h-2 bg-indigo-600 rounded-full animate-pulse"></span>
                            En Tránsito
                        </div>
                    </div>
                    <div class="space-y-8">
                        <div class="flex items-start gap-6">
                            <div class="w-4 flex flex-col items-center">
                                <div class="w-4 h-4 rounded-full border-2 border-slate-200 bg-white"></div>
                                <div class="w-0.5 h-20 bg-slate-100 border-l-2 border-dashed border-slate-200 my-1"></div>
                                <div class="w-4 h-4 rounded-full bg-indigo-600 ring-4 ring-indigo-50"></div>
                            </div>
                            <div class="flex-1 space-y-8 pt-0.5">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Carga</p>
                                    <p id="active-origin" class="text-xl font-extrabold text-slate-900"></p>
                                    <p id="active-load-time" class="text-xs text-slate-500 font-mono mt-1"></p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Descarga</p>
                                    <p id="active-dest" class="text-xl font-extrabold text-slate-900"></p>
                                    <p id="active-arrival-time" class="text-xs text-indigo-600 font-bold italic font-mono mt-1">Pendiente...</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-4 pt-4">
                            <button id="btn-arrive" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold transition-all shadow-md active:scale-95">Registrar Llegada</button>
                            <button id="btn-complete" class="flex-1 bg-black text-white py-4 rounded-2xl font-bold transition-all shadow-md opacity-20 cursor-not-allowed active:scale-95" disabled>Descargado</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- New Trip Form -->
            <section id="record-section" class="hidden glass-card rounded-3xl p-6 shadow-sm">
                <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-6">Nuevo Viaje</h2>
                <form id="main-form" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <input type="text" id="input-origin" required placeholder="Lugar de Carga" class="w-full p-4 bg-slate-100 border-transparent rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all">
                        <input type="text" id="input-dest" required placeholder="Lugar de Descarga" class="w-full p-4 bg-slate-100 border-transparent rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all">
                    </div>
                    <input type="text" id="input-ref" placeholder="Referencia / CMR (Opcional)" class="w-full p-4 bg-slate-100 border-transparent rounded-2xl focus:ring-2 focus:ring-black outline-none transition-all">
                    <button type="submit" class="w-full bg-black text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-slate-800 transition-all active:scale-[0.98]">Iniciar Carga</button>
                </form>
            </section>

            <!-- History -->
            <section id="history-section" class="hidden space-y-6">
                <div class="flex justify-between items-end px-2">
                    <div>
                        <h2 class="text-2xl font-black text-slate-900 tracking-tighter">Historial</h2>
                        <p id="week-indicator" class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter"></p>
                    </div>
                    <button id="download-pdf" class="bg-white border border-slate-200 text-black px-5 py-3 rounded-2xl text-[10px] font-black shadow-sm uppercase tracking-widest hover:bg-slate-50 transition-all">PDF Semanal</button>
                </div>
                <div id="history-list" class="space-y-4"></div>
                <div id="history-empty" class="text-center py-20 text-slate-400 italic hidden">No hay viajes registrados.</div>
            </section>

        </main>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-black text-white px-10 py-4 rounded-2xl text-[10px] font-bold shadow-2xl transition-all opacity-0 translate-y-20 pointer-events-none z-[100] tracking-widest uppercase"></div>

    <script>
        let state = {
            user: '',
            truck: '',
            trailer: '',
            shiftStartTime: '',
            activeTrip: null,
            records: []
        };

        const KEY = 'code_stellantis_v3';

        const getWeek = (d = new Date()) => {
            const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return `${date.getUTCFullYear()}-W${Math.ceil((((date - yearStart) / 86400000) + 1) / 7)}`;
        };

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-20', 'pointer-events-none'), 2500);
        };

        const save = () => localStorage.setItem(KEY, JSON.stringify(state));
        const load = () => {
            const data = localStorage.getItem(KEY);
            if (data) state = JSON.parse(data);
        };

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('app-content').style.opacity = '1';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
            }, 2500);
        });

        function render() {
            if (state.user && state.truck) {
                document.getElementById('setup-section').classList.add('hidden');
                document.getElementById('btn-change-shift').classList.remove('hidden');
                document.getElementById('dashboard-info').classList.remove('hidden');
                document.getElementById('history-section').classList.remove('hidden');
                
                document.getElementById('info-user').innerText = state.user;
                document.getElementById('info-shift-start').innerText = state.shiftStartTime;
                document.getElementById('info-vehicle').innerText = `${state.truck} / ${state.trailer || '-'}`;

                if (state.activeTrip) {
                    document.getElementById('record-section').classList.add('hidden');
                    document.getElementById('active-trip-container').classList.remove('hidden');
                    document.getElementById('active-origin').innerText = state.activeTrip.origin;
                    document.getElementById('active-dest').innerText = state.activeTrip.dest;
                    document.getElementById('active-load-time').innerText = "Cargado: " + state.activeTrip.loadTime;
                    
                    const btnArrive = document.getElementById('btn-arrive');
                    const btnComplete = document.getElementById('btn-complete');
                    const arrivalTxt = document.getElementById('active-arrival-time');

                    if (state.activeTrip.arrivalTime) {
                        arrivalTxt.innerText = "Llegada: " + state.activeTrip.arrivalTime;
                        btnArrive.classList.add('opacity-20', 'cursor-not-allowed');
                        btnArrive.disabled = true;
                        btnComplete.classList.remove('opacity-20', 'cursor-not-allowed');
                        btnComplete.disabled = false;
                    } else {
                        arrivalTxt.innerText = "En tránsito...";
                        btnArrive.classList.remove('opacity-20', 'cursor-not-allowed');
                        btnArrive.disabled = false;
                        btnComplete.classList.add('opacity-20', 'cursor-not-allowed');
                        btnComplete.disabled = true;
                    }
                } else {
                    document.getElementById('record-section').classList.remove('hidden');
                    document.getElementById('active-trip-container').classList.add('hidden');
                }
            } else {
                document.getElementById('setup-section').classList.remove('hidden');
                document.getElementById('btn-change-shift').classList.add('hidden');
                document.getElementById('dashboard-info').classList.add('hidden');
                document.getElementById('record-section').classList.add('hidden');
            }
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const empty = document.getElementById('history-empty');
            const weekIndicator = document.getElementById('week-indicator');
            const curWeek = getWeek();
            weekIndicator.innerText = "Semana " + curWeek.split('-W')[1];
            
            const weekRecords = state.records.filter(r => r.week === curWeek)
                .sort((a, b) => b.timestamp - a.timestamp);

            if (weekRecords.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = weekRecords.map(r => `
                <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-black">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[9px] font-black bg-black text-white px-2 py-0.5 rounded tracking-widest uppercase">${r.user}</span>
                        <span class="text-[10px] text-slate-400 font-mono">${r.date}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Carga</p>
                            <p class="text-sm font-extrabold text-slate-900">${r.origin}</p>
                            <p class="text-[10px] text-slate-500 font-mono">${r.loadTime}</p>
                        </div>
                        <div class="h-px flex-1 bg-slate-100 relative"><div class="absolute right-0 top-1/2 -translate-y-1/2 w-1.5 h-1.5 rounded-full bg-black"></div></div>
                        <div class="flex-1 text-right">
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Descarga</p>
                            <p class="text-sm font-extrabold text-slate-900">${r.dest}</p>
                            <p class="text-[10px] text-indigo-600 font-bold font-mono">${r.unloadTime}</p>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t flex justify-between items-center">
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">REF: ${r.ref || '-'}</span>
                        <button onclick="deleteRecord(${r.id})" class="text-slate-300 hover:text-red-500 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('setup-form').onsubmit = (e) => {
            e.preventDefault();
            const now = new Date();
            state.user = document.getElementById('user-name').value.trim();
            state.truck = document.getElementById('truck-plate').value.toUpperCase().trim();
            state.trailer = document.getElementById('trailer-plate').value.toUpperCase().trim();
            state.shiftStartTime = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            save();
            render();
            showToast("JORNADA INICIADA");
        };

        document.getElementById('btn-change-shift').onclick = () => {
            if(confirm("¿Deseas finalizar el turno actual e iniciar uno nuevo?")) {
                state.user = '';
                state.shiftStartTime = '';
                state.activeTrip = null;
                save();
                render();
            }
        };

        document.getElementById('main-form').onsubmit = (e) => {
            e.preventDefault();
            const now = new Date();
            state.activeTrip = {
                origin: document.getElementById('input-origin').value.trim(),
                dest: document.getElementById('input-dest').value.trim(),
                ref: document.getElementById('input-ref').value.trim(),
                timestamp: now.getTime(),
                loadTime: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                arrivalTime: null,
                user: state.user
            };
            e.target.reset();
            save();
            render();
            showToast("VIAJE INICIADO");
        };

        document.getElementById('btn-arrive').onclick = () => {
            state.activeTrip.arrivalTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            save();
            render();
            showToast("LLEGADA REGISTRADA");
        };

        document.getElementById('btn-complete').onclick = () => {
            const now = new Date();
            const record = {
                id: Date.now(),
                timestamp: state.activeTrip.timestamp,
                date: now.toLocaleDateString('es-ES'),
                week: getWeek(now),
                user: state.user,
                origin: state.activeTrip.origin,
                dest: state.activeTrip.dest,
                loadTime: state.activeTrip.loadTime,
                unloadTime: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                ref: state.activeTrip.ref,
                truck: state.truck,
                trailer: state.trailer
            };
            state.records.push(record);
            state.activeTrip = null;
            save();
            render();
            showToast("VIAJE COMPLETADO");
        };

        function deleteRecord(id) {
            if (confirm("¿Eliminar registro?")) {
                state.records = state.records.filter(r => r.id !== id);
                save();
                render();
            }
        }

        document.getElementById('download-pdf').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const curWeek = getWeek();
            
            // Agrupar por usuario
            const recordsByShift = state.records
                .filter(r => r.week === curWeek)
                .sort((a, b) => a.timestamp - b.timestamp)
                .reduce((acc, r) => {
                    if (!acc[r.user]) acc[r.user] = [];
                    acc[r.user].push(r);
                    return acc;
                }, {});

            doc.setFontSize(22);
            doc.text('CODE P7 STELLANTIS', 14, 20);
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`BITÁCORA SEMANAL · SEMANA ${curWeek.split('-W')[1]} · ${curWeek.split('-W')[0]}`, 14, 28);

            let currentY = 35;

            Object.keys(recordsByShift).forEach(user => {
                // Header del Operario
                doc.setFillColor(245, 245, 247);
                doc.rect(14, currentY, 269, 10, 'F');
                doc.setFontSize(11);
                doc.setTextColor(0);
                doc.setFont(undefined, 'bold');
                doc.text(`OPERARIO: ${user.toUpperCase()}`, 18, currentY + 7);
                
                const tableBody = recordsByShift[user].map(r => [
                    r.date,
                    r.origin,
                    r.loadTime,
                    r.dest,
                    r.unloadTime,
                    r.ref || '-',
                    r.truck,
                    r.trailer || '-'
                ]);

                doc.autoTable({
                    startY: currentY + 12,
                    head: [['Fecha', 'Carga (Origen)', 'H. Carga', 'Descarga (Destino)', 'H. Llegada', 'Ref/CMR', 'Camión', 'Remolque']],
                    body: tableBody,
                    headStyles: { fillStyle: [0, 0, 0], fontSize: 8, fontStyle: 'bold' },
                    styles: { fontSize: 8, cellPadding: 3 },
                    margin: { left: 14, right: 14 },
                    theme: 'grid'
                });

                currentY = doc.lastAutoTable.finalY + 15;
            });

            doc.save(`CODE_STELLANTIS_${curWeek}.pdf`);
        };

        load();
        render();
    </script>
</body>
</html>

```
