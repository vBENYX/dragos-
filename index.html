            <section id="history-section" class="hidden space-y-4">

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>

                    </button>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl text-xs font-bold shadow-2xl transition-all opacity-0 translate-y-20 pointer-events-none z-[100] tracking-widest uppercase"></div>

    <script>
        // State
        let state = {
            truck: '',
            trailer: '',
            activeTrip: null,
            records: []
        };

        const KEY = 'code_p7_storage_v1';

        // Helpers
        const getWeek = (d = new Date()) => {
            const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return `${date.getUTCFullYear()}-W${Math.ceil((((date - yearStart) / 86400000) + 1) / 7)}`;
        };

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-20', 'pointer-events-none'), 2500);
        };

        const save = () => localStorage.setItem(KEY, JSON.stringify(state));
        const load = () => {
            const data = localStorage.getItem(KEY);
            if (data) state = JSON.parse(data);
        };

        // Splash screen animation
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const app = document.getElementById('app-content');
                splash.style.opacity = '0';
                app.style.opacity = '1';
                setTimeout(() => splash.style.display = 'none', 800);
            }, 2500); // Duración de la presentación Apple
        });

        function render() {
            if (state.truck) {
                document.getElementById('setup-form').classList.add('hidden');
                document.getElementById('active-vehicles').classList.remove('hidden');
                document.getElementById('edit-vehicles-btn').classList.remove('hidden');
                document.getElementById('history-section').classList.remove('hidden');
                
                document.getElementById('display-truck').innerText = state.truck;
                document.getElementById('display-trailer').innerText = state.trailer || 'N/A';
                document.getElementById('nav-truck-info').innerText = `${state.truck} / ${state.trailer || 'S/R'}`;
                document.getElementById('header-info').classList.remove('hidden');

                if (state.activeTrip) {
                    document.getElementById('record-section').classList.add('hidden');
                    document.getElementById('active-trip-container').classList.remove('hidden');
                    document.getElementById('active-origin').innerText = state.activeTrip.origin;
                    document.getElementById('active-dest').innerText = state.activeTrip.dest;
                    document.getElementById('active-load-time').innerText = "Cargado: " + state.activeTrip.loadTime;
                    
                    if (state.activeTrip.arrivalTime) {
                        document.getElementById('active-arrival-time').innerText = "Llegada: " + state.activeTrip.arrivalTime;
                        document.getElementById('btn-arrive').classList.add('opacity-30', 'cursor-not-allowed');
                        document.getElementById('btn-arrive').disabled = true;
                        document.getElementById('btn-complete-descarga').classList.remove('opacity-30', 'cursor-not-allowed');
                        document.getElementById('btn-complete-descarga').disabled = false;
                    } else {
                        document.getElementById('active-arrival-time').innerText = "En tránsito...";
                        document.getElementById('btn-arrive').classList.remove('opacity-30', 'cursor-not-allowed');
                        document.getElementById('btn-arrive').disabled = false;
                        document.getElementById('btn-complete-descarga').classList.add('opacity-30', 'cursor-not-allowed');
                        document.getElementById('btn-complete-descarga').disabled = true;
                    }
                } else {
                    document.getElementById('record-section').classList.remove('hidden');
                    document.getElementById('active-trip-container').classList.add('hidden');
                }
            }
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const empty = document.getElementById('history-empty');
            const currentWeek = getWeek();
            document.getElementById('week-indicator').innerText = "Calendario Semanal: " + currentWeek;
            
            const weekRecords = state.records.filter(r => r.week === currentWeek);

            if (weekRecords.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = weekRecords.map(r => `
                <div class="glass-card p-5 rounded-2xl shadow-sm border-l-4 border-black">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] font-black bg-black text-white px-2 py-0.5 rounded tracking-widest uppercase">Viaje Finalizado</span>
                        <span class="text-[10px] text-slate-400 font-mono">${r.date}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex-1">
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">De</p>
                            <p class="text-sm font-extrabold text-slate-900">${r.origin}</p>
                            <p class="text-[10px] text-slate-500 font-mono">${r.loadTime}</p>
                        </div>
                        <div class="flex items-center">
                            <div class="w-1.5 h-1.5 rounded-full bg-slate-200"></div>
                            <div class="w-8 h-px bg-slate-200"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
                        </div>
                        <div class="flex-1 text-right">
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">A</p>
                            <p class="text-sm font-extrabold text-slate-900">${r.dest}</p>
                            <p class="text-[10px] text-black font-bold font-mono">${r.unloadTime}</p>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
                        <div class="flex gap-4">
                            <span class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">Ref: <b class="text-slate-800">${r.ref || '-'}</b></span>
                            <span class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">T: <b class="text-slate-800">${r.truck}</b></span>
                            <span class="text-[9px] text-slate-400 uppercase font-bold tracking-tighter">R: <b class="text-slate-800">${r.trailer || '-'}</b></span>
                        </div>
                        <button onclick="deleteRecord(${r.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Handlers
        document.getElementById('setup-form').onsubmit = (e) => {
            e.preventDefault();
            state.truck = document.getElementById('truck-plate').value.toUpperCase();
            state.trailer = document.getElementById('trailer-plate').value.toUpperCase();
            save();
            render();
            showToast("VEHÍCULO CONFIGURADO");
        };

        document.getElementById('edit-vehicles-btn').onclick = () => {
            document.getElementById('setup-form').classList.remove('hidden');
            document.getElementById('active-vehicles').classList.add('hidden');
            document.getElementById('edit-vehicles-btn').classList.add('hidden');
        };

        document.getElementById('main-form').onsubmit = (e) => {
            e.preventDefault();
            const now = new Date();
            state.activeTrip = {
                origin: document.getElementById('input-origin').value,
                dest: document.getElementById('input-dest').value,
                ref: document.getElementById('input-ref').value,
                timestamp: now.getTime(),
                loadTime: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                arrivalTime: null,
                truck: state.truck,
                trailer: state.trailer
            };
            e.target.reset();
            save();
            render();
            showToast("CARGA INICIADA");
        };

        document.getElementById('btn-arrive').onclick = () => {
            state.activeTrip.arrivalTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            save();
            render();
            showToast("LLEGADA REGISTRADA");
        };

        document.getElementById('btn-complete-descarga').onclick = () => {
            const now = new Date();
            const record = {
                id: Date.now(),
                timestamp: state.activeTrip.timestamp, // Guardamos timestamp original para orden
                date: now.toLocaleDateString('es-ES'),
                week: getWeek(now),
                origin: state.activeTrip.origin,
                dest: state.activeTrip.dest,
                loadTime: state.activeTrip.loadTime,
                unloadTime: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                ref: state.activeTrip.ref,
                truck: state.activeTrip.truck,
                trailer: state.activeTrip.trailer
            };
            state.records.unshift(record);
            state.activeTrip = null;
            save();
            render();
            showToast("VIAJE FINALIZADO");
        };

        function deleteRecord(id) {
            if (confirm("¿Eliminar registro?")) {
                state.records = state.records.filter(r => r.id !== id);
                save();
                render();
            }
        }

        // PDF Generation
        document.getElementById('download-pdf').onclick = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const currentWeek = getWeek();
            
            // Ordenamos CRONOLÓGICAMENTE (del más antiguo al más nuevo)
            const weekRecords = state.records
                .filter(r => r.week === currentWeek)
                .sort((a, b) => a.timestamp - b.timestamp);

            doc.setFontSize(16);
            doc.setTextColor(0,0,0);
            doc.text('CODE P7 STELLANTIS', 14, 15);
            
            doc.setFontSize(9);
            doc.setTextColor(100);
            doc.text(`REGISTRO CRONOLÓGICO SEMANAL - ${currentWeek}`, 14, 22);
            doc.text(`Vehículo: ${state.truck} | Remolque: ${state.trailer || 'N/A'}`, 14, 27);

            const tableBody = weekRecords.map(r => [
                r.date,
                r.origin,
                r.loadTime,
                r.dest,
                r.unloadTime,
                r.ref || '-',
                r.truck,
                r.trailer || '-'
            ]);

            doc.autoTable({
                startY: 35,
                head: [['Fecha', 'Carga (Origen)', 'Salida', 'Descarga (Destino)', 'Llegada', 'Ref/CMR', 'Camión', 'Remolque']],
                body: tableBody,
                headStyles: { fillStyle: [0, 0, 0], textColor: [255,255,255], fontStyle: 'bold' },
                alternateRowStyles: { fillStyle: [248, 248, 250] },
                styles: { fontSize: 8, cellPadding: 4 },
                margin: { left: 14, right: 14 }
            });

            doc.save(`CODE_P7_STELLANTIS_${currentWeek}.pdf`);
        };

        // Initialize
        load();
        render();
    </script>
</body>
</html>
