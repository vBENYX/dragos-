<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" name="viewport"/>
<title>XPO — Registro de Plataformas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sf-font@1.0.0/sf-font.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root {
  --accent:        #0A84FF;
  --accent-deep:   #0060CC;
  --accent-glow:   rgba(10,132,255,.28);
  --ok:            #30D158;
  --warn:          #FFD60A;
  --danger:        #FF453A;

–bg:            #EEF0F6;
–surface:       rgba(255,255,255,.72);
–surface-solid: #FFFFFF;
–border:        rgba(0,0,0,.07);
–border-light:  rgba(255,255,255,.75);
–line:          rgba(0,0,0,.07);

–text:          #111418;
–text-2:        #3A3F47;
–text-muted:    #7A7F88;
–placeholder:   rgba(120,125,135,.80);

–state-loaded-bg:    rgba(48,209,88,.12);
–state-loaded-bd:    rgba(48,209,88,.30);
–state-loaded-tx:    #0A7A35;
–state-empty-bg:     rgba(10,132,255,.11);
–state-empty-bd:     rgba(10,132,255,.28);
–state-empty-tx:     #0055CC;
–state-broken-bg:    rgba(255,214,10,.14);
–state-broken-bd:    rgba(255,160,0,.30);
–state-broken-tx:    #7A4D00;

–r-sm:   10px;
–r-md:   16px;
–r-lg:   22px;
–r-xl:   28px;
–r-full: 999px;

–blur:   22px;
–ease:   cubic-bezier(.25,.8,.25,1);
–snap:   cubic-bezier(.22,1,.36,1);

–sh-card:   0 16px 48px rgba(15,20,35,.14), 0 4px 12px rgba(15,20,35,.06), inset 0 1px 2px rgba(255,255,255,.90);
–sh-hover:  0 22px 60px rgba(15,20,35,.18), 0 6px 18px rgba(15,20,35,.08), inset 0 1px 2px rgba(255,255,255,.92);
–sh-pill:   0 10px 28px rgba(15,20,35,.10), inset 0 1px 2px rgba(255,255,255,.88);
–sh-btn:    0 8px 20px rgba(15,20,35,.10), inset 0 1px 3px rgba(255,255,255,.90);
–sh-input:  inset 0 1px 3px rgba(255,255,255,.85), 0 2px 6px rgba(15,20,35,.04);
–sh-header: 0 18px 50px rgba(15,20,35,.14), inset 0 1px 3px rgba(255,255,255,.85);
}

/* ============================================================
RESET / BASE
============================================================ */
*, *::before, *::after { box-sizing: border-box; text-decoration: none !important; }
html, h1, h2, h3, h4, p { margin: 0; }
button, input, textarea, select { font: inherit; }
img, svg, video { display: block; max-width: 100%; }

@media (prefers-reduced-motion: reduce) {

- { animation-duration: .001ms !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
  }

html {
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
text-rendering: optimizeLegibility;
scroll-behavior: smooth;
}

body {
margin: 0;
font-family: “SF Pro Display”,“SF Pro Text”,-apple-system,BlinkMacSystemFont,“Inter”,system-ui,sans-serif;
font-size: 15px;
line-height: 1.46;
color: var(–text-2);
background: radial-gradient(ellipse 80% 60% at 50% -10%, #d6e4ff 0%, #eef0f6 55%, #e4e8f2 100%);
min-height: 100svh;
}

button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; cursor: pointer; }
input, textarea, button, select { font-size: 16px; }

/* ============================================================
LAYOUT
============================================================ */
.app {
max-width: 1060px;
margin: 0 auto;
padding: calc(16px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
}

/* ============================================================
GLASS MIXIN — shared surface style
============================================================ */
.glass {
background: var(–surface);
backdrop-filter: blur(var(–blur)) saturate(185%);
-webkit-backdrop-filter: blur(var(–blur)) saturate(185%);
border: 1px solid var(–border-light);
}

/* ============================================================
HEADER
============================================================ */
.header {
position: sticky;
top: 14px;
z-index: 20;
border-radius: var(–r-xl);
padding: 16px 22px;
background: rgba(255,255,255,.30);
backdrop-filter: blur(28px) saturate(190%);
-webkit-backdrop-filter: blur(28px) saturate(190%);
border: 1px solid rgba(255,255,255,.80);
box-shadow: var(–sh-header);
overflow: hidden;
isolation: isolate;
transition: box-shadow .35s var(–ease);
}

.header::before {
content: “”;
position: absolute;
inset: 0;
background: linear-gradient(170deg, rgba(10,132,255,.07) 0%, transparent 55%);
pointer-events: none;
}

body.scrolled .header {
box-shadow: 0 28px 70px rgba(15,20,35,.22), inset 0 1px 3px rgba(255,255,255,.88);
}

.brand {
display: flex;
align-items: center;
justify-content: center;
gap: 14px;
}

.chip {
position: relative;
overflow: hidden;
background: rgba(255,255,255,.70);
border: 1px solid rgba(0,0,0,.06);
padding: 5px 14px;
border-radius: var(–r-sm);
font-weight: 800;
font-size: 13px;
letter-spacing: .08em;
backdrop-filter: saturate(1.8) blur(8px);
box-shadow: inset 0 0 0 .5px rgba(255,255,255,.65), 0 2px 8px rgba(0,0,0,.06);
transform: translateY(-1px);
}

.chip::after {
content: “”;
position: absolute;
top: -50%; left: -30%; width: 60%; height: 200%;
background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.65) 50%, rgba(255,255,255,0) 100%);
transform: rotate(12deg);
animation: shimmer 3.8s infinite linear;
pointer-events: none;
}

@keyframes shimmer {
0%   { transform: translateX(-120%) rotate(12deg); }
100% { transform: translateX(220%) rotate(12deg); }
}

.logo-svg .ani-pop  { animation: logoPop .55s var(–snap) forwards; }
.logo-svg .ani-fade { animation: logoFade .9s var(–ease) forwards; }

@keyframes logoPop  { 0%{transform:translateY(6px) scale(.94); opacity:0} 100%{transform:none; opacity:1} }
@keyframes logoFade { 0%{letter-spacing:.12em; opacity:0} 100%{letter-spacing:0; opacity:1} }

.headline {
margin-top: 4px;
text-align: center;
font-size: clamp(12px, 2.2vw, 15px);
font-weight: 600;
letter-spacing: .14em;
text-transform: uppercase;
color: var(–text-muted);
}

/* ============================================================
CARD (flow card)
============================================================ */
.card {
background: rgba(255,255,255,.28);
backdrop-filter: blur(24px) saturate(185%);
-webkit-backdrop-filter: blur(24px) saturate(185%);
border: 1px solid rgba(255,255,255,.76);
border-radius: var(–r-xl);
box-shadow: var(–sh-card);
margin: 20px 0;
overflow: hidden;
transition: transform .3s var(–snap), box-shadow .3s var(–snap);
scroll-margin-top: 16px;
}

.card:hover {
transform: translateY(-2px);
box-shadow: var(–sh-hover);
}

.card-header {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
padding: 14px 20px;
border-bottom: 1px solid var(–line);
background: linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,0));
}

.chevron { opacity: .45; user-select: none; font-size: 18px; }

.title-lg {
font-weight: 700;
font-size: 17px;
letter-spacing: .01em;
color: var(–text);
}

.card-content {
position: relative;
min-height: 240px;
perspective: 1000px;
}

/* ============================================================
FLOW SCREENS
============================================================ */
.screen {
position: absolute;
inset: 0;
padding: 24px 20px 44px;
display: flex;
flex-direction: column;
gap: 14px;
align-items: center;
justify-content: flex-start;
opacity: 0;
transform: translateX(22px) scale(.985);
pointer-events: none;
transition: opacity .45s var(–ease), transform .45s var(–ease);
will-change: transform, opacity;
}

.screen.active {
opacity: 1;
transform: none;
pointer-events: auto;
}

.screen:not(.active) {
opacity: 0;
transform: translateY(14px) scale(.985);
}

.screen.out-left  { animation: slideOutL .36s var(–snap); }
.screen.out-right { animation: slideOutR .36s var(–snap); }

@keyframes slideOutL { from{opacity:1;transform:none} to{opacity:0;transform:translateX(-22px) scale(.985)} }
@keyframes slideOutR { from{opacity:1;transform:none} to{opacity:0;transform:translateX(22px) scale(.985)} }

.flash-once {
animation: flashBg .9s var(–ease);
}
@keyframes flashBg {
0%   { box-shadow: inset 0 0 0 0 rgba(48,209,88,.0) }
40%  { box-shadow: inset 0 0 0 80px rgba(48,209,88,.09) }
100% { box-shadow: inset 0 0 0 0 rgba(48,209,88,.0) }
}

/* ============================================================
STEP DOTS
============================================================ */
.steps {
display: flex;
align-items: center;
gap: 10px;
justify-content: center;
padding: 10px 0 14px;
}

.dot {
width: 10px;
height: 10px;
border-radius: var(–r-full);
background: rgba(0,0,0,.14);
opacity: 0;
transform: translateY(6px);
animation: dotEnter .38s var(–ease) forwards;
transition: background .28s var(–ease), transform .28s var(–snap), opacity .28s;
}
.dot:nth-child(1) { animation-delay: .05s; }
.dot:nth-child(2) { animation-delay: .12s; }
.dot:nth-child(3) { animation-delay: .20s; }

@keyframes dotEnter { to { opacity: .55; transform: none; } }

.dot.active {
background: var(–accent);
transform: scale(1.4);
opacity: 1;
animation: popDot .28s var(–snap);
}

.dot.done {
background: rgba(10,132,255,.5);
opacity: .85;
}

@keyframes popDot {
0%   { transform: scale(.85); }
55%  { transform: scale(1.5); }
100% { transform: scale(1.4); }
}

/* ============================================================
INPUTS
============================================================ */
.input, .textarea {
width: 100%;
max-width: 520px;
padding: 13px 16px;
border-radius: var(–r-md);
border: 1.5px solid rgba(210,215,228,.90);
background: rgba(255,255,255,.90);
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
outline: none;
font-size: 15px;
font-weight: 500;
color: var(–text);
box-shadow: var(–sh-input);
transition: border-color .18s, box-shadow .18s, transform .18s;
}

.input::placeholder, .textarea::placeholder {
color: var(–placeholder);
font-weight: 400;
}

.input:hover, .textarea:hover {
border-color: rgba(160,175,210,.80);
}

.input:focus, .textarea:focus {
border-color: var(–accent);
box-shadow: 0 0 0 4px var(–accent-glow), var(–sh-input);
transform: translateY(-1px);
}

.textarea {
min-height: 92px;
max-height: 220px;
resize: vertical;
}

@media (max-width: 480px) { .textarea { min-height: 74px; } }

/* ============================================================
BUTTONS
============================================================ */
.btn {
position: relative;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
padding: 12px 18px;
min-height: 48px;
border-radius: var(–r-md);
border: 1.5px solid rgba(210,215,228,.90);
background: linear-gradient(145deg, rgba(255,255,255,.90), rgba(240,242,248,.96));
color: var(–text);
font-weight: 600;
font-size: 15px;
letter-spacing: .01em;
box-shadow: var(–sh-btn);
transition: transform .22s var(–snap), box-shadow .22s var(–ease), background .15s;
will-change: transform, box-shadow;
overflow: hidden;
}

.btn:hover {
transform: translateY(-1px);
box-shadow: 0 12px 28px rgba(15,20,35,.13), inset 0 1px 3px rgba(255,255,255,.92);
}

.btn:active {
transform: scale(.96);
transition-duration: .08s;
}

.btn:disabled {
opacity: .55;
transform: none;
pointer-events: none;
}

/* ripple */
.btn::after {
content: “”;
position: absolute;
left: var(–px,50%); top: var(–py,50%);
width: 0; height: 0;
border-radius: var(–r-full);
background: rgba(255,255,255,.55);
transform: translate(-50%,-50%);
opacity: 0;
pointer-events: none;
}
.btn.pressed::after { animation: pressPulse .5s var(–snap) forwards; }

@keyframes pressPulse {
0%   { opacity: .45; width: 0; height: 0; }
70%  { opacity: .15; width: 200%; height: 200%; }
100% { opacity: 0;   width: 260%; height: 260%; }
}

.btn-primary {
background: linear-gradient(150deg, var(–accent), var(–accent-deep));
border-color: rgba(0,90,180,.85);
color: #fff;
box-shadow: 0 10px 28px rgba(9,76,176,.45), inset 0 1px 3px rgba(255,255,255,.35);
}

.btn-primary:hover {
box-shadow: 0 14px 36px rgba(9,76,176,.55), inset 0 1px 3px rgba(255,255,255,.40);
filter: brightness(1.04);
}

.btn-secondary {
background: linear-gradient(145deg, rgba(255,255,255,.88), rgba(234,237,246,.96));
border-color: rgba(210,215,228,.90);
}

/* state buttons */
.row.states {
display: grid;
grid-template-columns: repeat(3, minmax(0,1fr));
gap: 10px;
width: 100%;
max-width: 520px;
}

.row.states .btn {
width: 100%;
min-height: 58px;
font-size: 14px;
font-weight: 700;
border-radius: var(–r-md);
border: 1.5px solid rgba(210,215,228,.90);
background: rgba(255,255,255,.94);
box-shadow: 0 8px 22px rgba(15,20,35,.09), inset 0 1px 2px rgba(255,255,255,.95);
}

.row.states .btn.selected {
background: rgba(10,132,255,.15) !important;
border-color: var(–accent) !important;
color: var(–accent);
transform: scale(1.04) !important;
box-shadow: 0 0 0 3px rgba(10,132,255,.18), 0 10px 28px rgba(9,76,176,.18) !important;
}

.row.states .btn.selected::after {
content: “ ✓”;
font-weight: 800;
color: var(–accent);
}

.row {
display: flex;
gap: 10px;
flex-wrap: wrap;
justify-content: center;
width: 100%;
max-width: 520px;
}

@media (max-width: 640px) { .row .btn { flex: 1 1 100%; } }

/* ============================================================
META ROW
============================================================ */
.meta {
display: flex;
flex-wrap: wrap;
align-items: center;
justify-content: center;
gap: 6px 12px;
max-width: 520px;
font-size: 14px;
}

.meta .item   { color: var(–text-muted); font-weight: 500; white-space: nowrap; }
.meta strong  { color: var(–text); }

/* ============================================================
PANEL (summary + actions)
============================================================ */
.panel {
background: rgba(255,255,255,.28);
backdrop-filter: blur(24px) saturate(185%);
-webkit-backdrop-filter: blur(24px) saturate(185%);
border: 1px solid rgba(255,255,255,.76);
border-radius: var(–r-xl);
padding: 20px;
box-shadow: var(–sh-card);
margin: 18px 0;
transition: transform .25s var(–snap), box-shadow .25s var(–ease);
}

.panel:hover {
transform: translateY(-1px);
box-shadow: var(–sh-hover);
}

.panel.actions {
background: transparent !important;
box-shadow: none !important;
border: none !important;
padding: 8px 0;
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
margin-top: 16px !important;
}

/* ============================================================
PILLS (summary stats)
============================================================ */
.pills {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 12px;
}

@media (max-width: 600px) { .pills { grid-template-columns: 1fr !important; gap: 10px !important; } }

.pill {
position: relative;
overflow: hidden;
background: linear-gradient(145deg, rgba(255,255,255,.95), rgba(238,242,252,.98));
border: 1px solid rgba(215,220,234,.95);
border-radius: var(–r-lg);
padding: 14px 18px;
box-shadow: var(–sh-pill);
transition: transform .25s var(–snap), box-shadow .25s var(–ease);
}

.pill:hover {
transform: translateY(-1px);
box-shadow: var(–sh-hover);
}

.pill::before {
content: “”;
position: absolute;
inset: 0;
width: var(–fill, 0%);
background: linear-gradient(90deg, rgba(10,132,255,.14), rgba(10,132,255,.26));
transition: width .35s var(–ease);
}

.pill.update::after {
content: “”;
position: absolute;
top: 0; bottom: 0; width: 28%; left: -30%;
background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.65), rgba(255,255,255,0));
filter: blur(1px);
animation: pillShine 1.1s var(–ease);
}

@keyframes pillShine { 0%{left:-30%} 100%{left:110%} }

.pill-inner {
position: relative;
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
z-index: 1;
}

.pill .label {
font-weight: 500;
font-size: 14px;
color: var(–text-2);
}

.pill .val {
font-weight: 700;
font-size: 22px;
min-width: 2.5ch;
text-align: right;
color: var(–accent);
font-variant-numeric: tabular-nums;
letter-spacing: -.5px;
}

/* ============================================================
COMPACT PANEL (records list)
============================================================ */
.compact {
background: rgba(255,255,255,.28);
backdrop-filter: blur(24px) saturate(185%);
-webkit-backdrop-filter: blur(24px) saturate(185%);
border: 1px solid rgba(255,255,255,.76);
border-radius: var(–r-xl);
box-shadow: var(–sh-card);
contain: content;
}

.compact-header {
position: sticky;
top: 12px;
z-index: 5;
padding: 12px;
border-bottom: 1px solid var(–line);
border-top-left-radius: var(–r-xl);
border-top-right-radius: var(–r-xl);
background: rgba(255,255,255,.26);
backdrop-filter: blur(24px) saturate(185%);
-webkit-backdrop-filter: blur(24px) saturate(185%);
border: 1px solid rgba(255,255,255,.76);
display: flex;
gap: 8px;
justify-content: center;
flex-wrap: wrap;
}

@media (min-width: 600px) {
.compact-header {
justify-content: space-between;
align-items: center;
}
}

/* ============================================================
SEGMENT FILTER TABS
============================================================ */
.segment {
display: flex;
flex-wrap: wrap;
gap: 6px;
padding: 4px;
justify-content: center;
}

.segment button {
position: relative;
display: inline-flex;
align-items: center;
gap: 6px;
padding: 6px 12px;
border-radius: var(–r-full);
border: 1px solid rgba(0,0,0,.05);
background: rgba(255,255,255,.70);
font-size: 13px;
font-weight: 500;
color: var(–text-muted);
box-shadow: 0 1px 3px rgba(0,0,0,.05);
transition: background .18s, border-color .18s, color .18s, box-shadow .18s;
}

.segment button::before {
content: “”;
width: 8px;
height: 8px;
border-radius: 50%;
background: #C8CDD5;
flex-shrink: 0;
}

.segment button[data-tab=“TODAS”]::before    { background: linear-gradient(135deg, var(–accent), #00C896); }
.segment button[data-tab=“CARGADA”]::before  { background: var(–state-loaded-tx); }
.segment button[data-tab=“VACÍA”]::before    { background: var(–state-empty-tx); }
.segment button[data-tab=“AVERIADA”]::before { background: var(–state-broken-tx); }

.segment button.active {
background: rgba(10,132,255,.12);
border-color: rgba(10,132,255,.35);
color: var(–text);
box-shadow: 0 0 0 1.5px rgba(10,132,255,.20);
}

.segment .badge {
margin-left: 2px;
padding: 1px 7px;
border-radius: var(–r-full);
font-size: 11px;
font-weight: 700;
background: rgba(0,0,0,.05);
color: var(–accent);
}

.segment button.active .badge {
background: rgba(10,132,255,.15);
}

@media (max-width: 600px) {
.segment { justify-content: space-between; }
.segment button { flex: 1 1 auto; justify-content: flex-start; padding-inline: 8px; font-size: 12px; }
}

/* ============================================================
SEARCH INPUT
============================================================ */
.search-input {
margin-top: 6px;
font-size: 13px !important;
padding: 7px 12px !important;
max-width: 100%;
border-radius: var(–r-md) !important;
}

@media (min-width: 600px) {
.search-input { max-width: 220px; margin-top: 0; }
}

/* ============================================================
RECORDS
============================================================ */
#recordsContainer {
display: grid;
grid-template-columns: 1fr;
gap: 10px;
padding: 14px;
}

@media (min-width: 700px)  { #recordsContainer { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (min-width: 1100px) { #recordsContainer { grid-template-columns: repeat(3, minmax(0,1fr)); } }

.record {
position: relative;
background: rgba(255,255,255,.94);
border: 1px solid rgba(215,220,232,.95);
border-radius: var(–r-md);
padding: 12px 14px 12px 18px;
box-shadow: 0 8px 22px rgba(15,20,35,.10), inset 0 1px 2px rgba(255,255,255,.95);
transition: transform .3s var(–snap), box-shadow .3s var(–ease), background .15s;
animation: recordEntry .32s var(–ease) both;
min-width: 0;
}

@keyframes recordEntry {
0%   { opacity: 0; transform: translateY(10px); }
100% { opacity: 1; transform: none; }
}

.record::before {
content: “”;
position: absolute;
left: 0; top: 10%; bottom: 10%;
width: 3.5px;
border-radius: 3px;
background: rgba(0,0,0,.10);
}

.record[data-estado=“CARGADA”]::before  { background: var(–ok); }
.record[data-estado=“VACÍA”]::before    { background: var(–accent); }
.record[data-estado=“AVERIADA”]::before { background: var(–warn); }

.record:hover {
transform: scale(1.01);
box-shadow: 0 12px 32px rgba(15,20,35,.14), inset 0 1px 2px rgba(255,255,255,.96);
}

.record.expanded {
box-shadow: 0 16px 44px rgba(15,20,35,.18), inset 0 1px 3px rgba(255,255,255,.96);
}

.rowline {
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
padding: 2px 0;
}

.rowline .mat {
font-weight: 700;
font-size: 15px;
color: var(–text);
max-width: 46%;
white-space: nowrap;

ACTION BUTTONS (PDF / Clear)
============================================================ */

transform: scale(.96);

}

.panel.actions .action-btn.danger { color: var(–danger); }

/* ============================================================
DYNAMIC ISLAND
============================================================ */
#dynamicIsland {
position: fixed;
top: 12px;
left: 50%;
transform: translateX(-50%) scale(.92);
opacity: 0;
padding: 10px 24px;
background: rgba(0,0,0,.78);
color: #fff;
backdrop-filter: blur(22px);
border: 1px solid rgba(255,255,255,.22);
border-radius: var(–r-lg);
box-shadow: 0 20px 44px rgba(0,0,0,.50);
font-weight: 600;
font-size: 14px;
letter-spacing: .01em;
z-index: 9999;
isolation: isolate;
overflow: hidden;
min-width: 120px;
text-align: center;
transition: opacity .28s var(–ease), transform .28s var(–snap);
}

#dynamicIsland .bar {
position: absolute;
left: 10px; bottom: 6px;
height: 2.5px; width: 0%;
background: var(–accent);
border-radius: 3px;
transition: width .2s ease;
}

#dynamicIsland::after { display: none !important; }

#dynamicIsland.di-show {
opacity: 1;
transform: translateX(-50%) scale(1);
animation: islandPop .38s var(–snap);
}

#dynamicIsland.di-hide {
animation: islandShrink .28s ease-out forwards;
}

@keyframes islandPop {
0%   { transform: translateX(-50%) scale(.84); opacity: 0; }
55%  { transform: translateX(-50%) scale(1.06); opacity: 1; }
100% { transform: translateX(-50%) scale(1); }
}

@keyframes islandShrink {
0%   { transform: translateX(-50%) scale(1); opacity: 1; }
100% { transform: translateX(-50%) scale(.88); opacity: 0; }
}

/* ============================================================

============================================================ */

left: 50%; top: 16px;
transform: translateX(-50%) translateY(-16px);

color: #fff;

12% { opacity: 1; transform: translateX(-50%) translateY(0); }

PARTICLE / FLASH EFFECT
============================================================ */
#clearEffect {
position: fixed;
inset: 0;
pointer-events: none;
display: none;
z-index: 3000;
}

.particle {
position: absolute;
width: 8px; height: 8px;
border-radius: 50%;

box-shadow: 0 0 14px rgba(255,255,255,.9);

@keyframes particleOut {
to { transform: translate(var(–dx), var(–dy)) scale(0); opacity: 0; }

.flash {
position: absolute;
inset: 0;
background: radial-gradient(circle at center, rgba(255,255,255,.9), transparent 70%);

@keyframes flashOut { from{opacity:1} to{opacity:0} }

/* ============================================================
DYNAMIC LIGHT EFFECT
============================================================ */
.dynamic-light { position: relative; overflow: hidden; }

.dynamic-light::after {
content: “”;

inset: 0;

<script>
(function(){
 try{
 const dpr = window.devicePixelRatio || 1;
 if(dpr < 1.5) return;
 const want = dpr >= 3 ? '3x' : '2x';
 document.addEventListener('DOMContentLoaded', () => {
 const imgs = Array.from(document.querySelectorAll('img[data-2x], img[data-3x]'));
 imgs.forEach(img => {
 if (img.hasAttribute('srcset')) return;
 const src3 = img.getAttribute('data-3x');
 const src2 = img.getAttribute('data-2x');
 if (want === '3x' && src3) {
 img.src = src3;
 } else if ((want === '3x' && !src3 && src2) || (want === '2x' && src2)) {
 img.src = src2;
 }
 if (!img.hasAttribute('data-natural-width') && img.naturalWidth) {
 img.setAttribute('data-natural-width', img.naturalWidth);
 }
 });
 const bgEls = Array.from(document.querySelectorAll('[data-bg-2x], [data-bg-3x]'));
 bgEls.forEach(el => {
 const bg3 = el.getAttribute('data-bg-3x');
 const bg2 = el.getAttribute('data-bg-2x');
 if (want === '3x' && bg3) {
 el.style.backgroundImage = `url('${bg3}')`;
 } else if ((want === '3x' && !bg3 && bg2) || (want === '2x' && bg2)) {
 el.style.backgroundImage = `url('${bg2}')`;
 }
 });
 });
 } catch(e) {
 console.warn('DPR-swap script failed', e);
 }
})();
</script>

<script>

const STORAGE_KEY = 'plataformas-global';
function loadData(){ try{ const raw=localStorage.getItem(STORAGE_KEY); plataformas = raw ? JSON.parse(raw) : []; }catch(e){ plataformas = []; } }
function saveData(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(plataformas)); }catch(e){} }

 if(rect.top < 12 || rect.bottom > (window.innerHeight - 12)){ card.scrollIntoView({behavior:'smooth', block:'start'}); } }
function attachPressedEffect(el){
 if(!el) return;
 el.addEventListener('pointerdown', (ev)=>{
 const r = el.getBoundingClientRect();
 const x = Math.round(ev.clientX - r.left), y = Math.round(ev.clientY - r.top);
 el.style.setProperty('--px', x+'px'); el.style.setProperty('--py', y+'px');
 el.classList.add('pressed');
 });
 ['pointerup','pointerleave','pointercancel'].forEach(evt=>{
 el.addEventListener(evt, ()=>setTimeout(()=>el.classList.remove('pressed'), 180));
 });
}
function showIsland(text = "Acción completada", duration = 1600){
 const island = $('dynamicIsland'); const textEl = $('diText'); const bar = $('diBar');
 if(!island || !textEl) return;
 textEl.textContent = text;
 island.classList.remove('di-hide','di-hidden'); island.classList.add('di-show');
 if(bar) { bar.style.width = '0%'; setTimeout(()=>bar.style.width='100%', 20); }
 if(window.__islandTimer) clearTimeout(window.__islandTimer);
 window.__islandTimer = setTimeout(()=>{
 island.classList.remove('di-show'); island.classList.add('di-hide');
 setTimeout(()=>{ island.classList.remove('di-hide'); island.classList.add('di-hidden'); }, 260);
 }, duration);
}
function toast(msg='Registro guardado'){ showIsland(msg, 1800); }
function animateNumber(el, target){
 if(!el) return; const start = Number(el.textContent)||0; const diff = target - start;
 if(diff === 0) { el.textContent = target; return; }
 const dur = 420; const startT = performance.now();
 function step(t){
 const p = Math.min(1, (t-startT)/dur);
 el.textContent = Math.round(start + diff * p);
 if(p < 1) requestAnimationFrame(step);
 }
 requestAnimationFrame(step);

(function(){
 const lista = Object.keys(plataformas || {});

 if(!input) return;
 const box = document.createElement('div');
 box.style.position = 'absolute';
 box.style.background = 'rgba(255,255,255,0.9)';
 box.style.backdropFilter = 'blur(18px)';
 box.style.border = '1px solid rgba(210,210,220,0.8)';
 box.style.borderRadius = '14px';
 box.style.padding = '6px 0';
 box.style.boxShadow = '0 14px 26px rgba(0,0,0,0.15)';
 box.style.zIndex = '2000';
 box.style.display = 'none';
 box.style.maxHeight = '200px';
 box.style.overflowY = 'auto';
 document.body.appendChild(box);
 function positionBox(){
 const r = input.getBoundingClientRect();
 box.style.left = r.left + 'px';
 box.style.top = (r.bottom + window.scrollY + 6) + 'px';
 box.style.width = r.width + 'px';
 }
 input.addEventListener('input', ()=>{
 const val = input.value.toUpperCase();
 positionBox();
 if(!val){
 box.style.display = 'none';
 return;
 }
 const matches = lista.filter(m => m.includes(val));
 if(!matches.length){
 box.style.display = 'none';
 return;
 }
 box.innerHTML = matches.map(m=>`<div style="
 padding:10px 14px;
 cursor:pointer;
 font-size:14px;
 transition:background .2s;">
 ${m}
 </div>`).join('');
 [...box.children].forEach(div=>{
 div.addEventListener('mouseover',()=>div.style.background="rgba(10,132,255,0.15)");
 div.addEventListener('mouseout',()=>div.style.background="transparent");
 div.addEventListener('click',()=>{
 input.value = div.innerText.trim();
 box.style.display='none';
 });
 });
 box.style.display = 'block';
 });
 document.addEventListener('click',(e)=>{
 if(!box.contains(e.target) && e.target!==input){
 box.style.display='none';
 }
 });
})();
</script>
