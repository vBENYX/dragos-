<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" name="viewport"/>
    <title>XPO — Registro de Plataformas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ══════════════════════════════════════════
           RESET & BASE
        ══════════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; text-decoration: none !important; }
        img, svg, video { display: block; max-width: 100%; }
        button, input, textarea, select { font: inherit; }
        button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; cursor: pointer; }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            scroll-behavior: smooth;
        }

        /* ══════════════════════════════════════════
           DESIGN TOKENS (Corregidos guiones)
        ══════════════════════════════════════════ */
        :root {
            --accent:      #0A84FF;
            --accent-dark: #0062CC;
            --ok:          #34C759;
            --warn:        #FF9F0A;
            --danger:      #FF3B30;

            --bg:    #EEF0F5;
            --panel: rgba(255,255,255,0.88);
            --line:  rgba(0,0,0,0.07);
            --text:  #111418;
            --muted: #6A6F78;
            --sub:   #9EA3AA;

            --r-sm: 12px;
            --r-md: 18px;
            --r-lg: 24px;
            --r-xl: 30px;

            --shadow-card:  0 2px 6px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.07);
            --shadow-float: 0 4px 12px rgba(0,0,0,.06), 0 18px 48px rgba(0,0,0,.12);
            --shadow-btn:   0 1px 3px rgba(0,0,0,.06), 0 6px 16px rgba(0,0,0,.08);

            --ease-snap: cubic-bezier(.22,1,.36,1);
            --ease-soft: cubic-bezier(.25,.8,.25,1);

            --c-cargada-bg:  rgba(0,180,135,.12);
            --c-cargada-bd:  rgba(0,180,135,.35);
            --c-cargada-tx:  #0A8369;
            --c-vacia-bg:    rgba(10,132,255,.10);
            --c-vacia-bd:    rgba(10,132,255,.30);
            --c-vacia-tx:    #0A60CC;
            --c-averiada-bg: rgba(255,159,10,.12);
            --c-averiada-bd: rgba(255,159,10,.35);
            --c-averiada-tx: #996000;
        }

        body {
            font-family: "DM Sans", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: radial-gradient(ellipse 80% 50% at 50% 0%, #d8e4ff 0%, var(--bg) 60%);
            min-height: 100vh;
            color: var(--text);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .app {
            max-width: 980px;
            margin: 0 auto;
            padding: calc(16px + env(safe-area-inset-top)) 14px calc(80px + env(safe-area-inset-bottom));
        }

        /* ══════════════════════════════════════════
           HEADER
        ══════════════════════════════════════════ */
        .header {
            position: sticky;
            top: 12px;
            z-index: 100;
            border-radius: var(--r-xl);
            padding: 14px 22px;
            background: rgba(255,255,255,.55);
            border: 1px solid rgba(255,255,255,.75);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            box-shadow: var(--shadow-float);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all .3s ease;
        }
        body.scrolled .header { transform: scale(0.98); box-shadow: 0 4px 20px rgba(0,0,0,.1); }

        .brand { display: flex; align-items: center; gap: 10px; }
        .chip {
            background: rgba(255,255,255,.8);
            border: 1px solid rgba(0,0,0,.06);
            padding: 4px 9px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 10px;
            letter-spacing: .06em;
            position: relative;
            overflow: hidden;
        }
        .chip::after {
            content: "";
            position: absolute;
            top: -50%; left: -30%;
            width: 60%; height: 200%;
            background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,.65) 50%, transparent 100%);
            animation: shimmer 3.6s infinite linear;
        }
        @keyframes shimmer { from { transform: translateX(-120%) rotate(12deg); } to { transform: translateX(220%) rotate(12deg); } }

        .headline { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }

        /* ══════════════════════════════════════════
           CARDS
        ══════════════════════════════════════════ */
        .card, .panel, .compact {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,.80);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            margin: 16px 0;
            overflow: hidden;
        }

        #flowCard { max-width: 680px; margin: 20px auto !important; border-radius: var(--r-xl) !important; }

        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--line);
        }
        .title-lg { font-weight: 700; font-size: 15px; }

        /* STEPS UI */
        .steps-bar { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 20px 0; }
        .step-pip { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .step-pip-dot {
            width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; color: var(--sub); transition: .3s;
        }
        .step-pip-dot.active { border-color: var(--accent); background: var(--accent); color: #fff; transform: scale(1.1); }
        .step-pip-dot.done { border-color: var(--ok); background: var(--ok); color: #fff; }
        .step-pip-label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--sub); }
        .step-pip.active .step-pip-label { color: var(--accent); }

        .step-connector { flex: 1; height: 2px; max-width: 60px; background: var(--line); margin-bottom: 14px; border-radius: 2px; overflow: hidden; }
        .step-connector-fill { height: 100%; width: 0%; background: var(--ok); transition: width .3s; }

        /* SCREENS */
        .card-content { position: relative; min-height: 280px; }
        .screen {
            position: absolute; inset: 0; padding: 24px;
            display: flex; flex-direction: column; gap: 16px; align-items: center;
            opacity: 0; pointer-events: none; transform: translateY(10px);
            transition: .4s var(--ease-snap);
        }
        .screen.active { opacity: 1; pointer-events: auto; transform: none; }

        .meta {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            background: rgba(0,0,0,.03); padding: 8px 14px; border-radius: var(--r-sm);
            font-size: 13px; width: 100%; max-width: 520px;
        }

        /* ══════════════════════════════════════════
           INPUTS & BUTTONS
        ══════════════════════════════════════════ */
        .input, .textarea, select {
            width: 100%; max-width: 520px; padding: 14px;
            border-radius: var(--r-md); border: 1.5px solid #D6D8DC;
            background: #fff; transition: .2s;
        }
        .input:focus, .textarea:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(10,132,255,.15); }
        .input.error { border-color: var(--danger); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 14px 24px; border-radius: var(--r-md); border: none;
            font-weight: 700; cursor: pointer; transition: .2s; width: 100%; max-width: 520px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-secondary { background: var(--line); color: var(--text); }

        .row.states { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 520px; }
        .row.states .btn { flex-direction: column; padding: 16px 8px; font-size: 12px; height: auto; }
        .btn.selected { border: 2px solid currentColor; transform: scale(1.02); }

        /* ══════════════════════════════════════════
           RECORDS & PILLS
        ══════════════════════════════════════════ */
        .pills { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .pill { 
            background: #fff; padding: 16px; border-radius: var(--r-md); border: 1px solid var(--line); 
            position: relative; overflow: hidden;
        }
        .pill::before {
            content: ""; position: absolute; left: 0; bottom: 0; height: 3px;
            width: var(--fill, 0%); background: var(--accent); transition: width .5s;
        }
        .pill-inner { display: flex; align-items: center; justify-content: space-between; }
        .pill .val { font-size: 20px; font-weight: 800; }

        .record {
            background: #fff; padding: 14px; border-radius: var(--r-md); border: 1px solid var(--line);
            margin-bottom: 8px; cursor: pointer; transition: .2s; border-left: 4px solid var(--line);
        }
        .record:hover { transform: translateX(4px); box-shadow: var(--shadow-card); }
        .record[data-estado="CARGADA"] { border-left-color: var(--c-cargada-tx); }
        .record[data-estado="VACÍA"] { border-left-color: var(--c-vacia-tx); }
        .record[data-estado="AVERIADA"] { border-left-color: var(--c-averiada-tx); }

        /* ══════════════════════════════════════════
           TOASTS & MODALS
        ══════════════════════════════════════════ */
        #dynamicIsland {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; padding: 12px 24px; border-radius: 24px;
            z-index: 9999; display: none; font-size: 14px; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal.open { display: flex; }
        .modal-card { background: #fff; padding: 24px; border-radius: 24px; width: 90%; max-width: 500px; }

        /* Estilos específicos para el botón de llamada con animación */
        .call-btn.call-alert { animation: pulse-red 2s infinite; border-color: var(--danger); }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } 
        }

        .segment { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
        .segment button { 
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--line); 
            background: #fff; white-space: nowrap; font-size: 13px; font-weight: 600;
        }
        .segment button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        #clearHoldBar { position: absolute; left: 0; bottom: 0; height: 4px; background: var(--danger); width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="dynamicIsland">Acción completada</div>

<div class="app">
    <header class="header" id="glassHeader">
        <div class="brand">
            <div class="chip">SISTEMA</div>
            <svg style="width:140px;height:auto;" viewBox="0 0 260 40">
                <text fill="#E30613" font-size="30" font-weight="900" x="0" y="30">XPO</text>
                <text fill="#1c1f24" font-size="30" font-weight="900" x="88" y="30">LOGISTICS</text>
            </svg>
        </div>
        <div class="headline">Registro de Plataformas</div>
    </header>

    <section class="card" id="flowCard">
        <div class="card-header">
            <div class="title-lg" id="flowTitle">Matrícula</div>
        </div>

        <div class="steps-bar">
            <div class="step-pip active" id="pip1">
                <div class="step-pip-dot active" id="pipDot1">1</div>
                <div class="step-pip-label">Matrícula</div>
            </div>
            <div class="step-connector"><div class="step-connector-fill" id="conn1"></div></div>
            <div class="step-pip" id="pip2">
                <div class="step-pip-dot" id="pipDot2">2</div>
                <div class="step-pip-label">Estado</div>
            </div>
            <div class="step-connector"><div class="step-connector-fill" id="conn2"></div></div>
            <div class="step-pip" id="pip3">
                <div class="step-pip-dot" id="pipDot3">3</div>
                <div class="step-pip-label">Detalle</div>
            </div>
        </div>

        <div class="card-content">
            <div class="screen active" id="s1">
                <p style="color: var(--muted); font-size: 14px; align-self: flex-start;">Introduce matrícula:</p>
                <input class="input" id="matriculaInput" placeholder="Ej: 1234 ABC" autocomplete="off"/>
                <button class="btn btn-primary" id="toS2">Siguiente →</button>
            </div>

            <div class="screen" id="s2">
                <div class="meta">Matrícula: <strong id="matriculaDisplay">—</strong></div>
                <div class="row states">
                    <button class="btn btn-secondary" onclick="chooseEstado('CARGADA')">📦 CARGADA</button>
                    <button class="btn btn-secondary" onclick="chooseEstado('VACÍA')">🚛 VACÍA</button>
                    <button class="btn btn-secondary" onclick="chooseEstado('AVERIADA')">⚠️ AVERIADA</button>
                </div>
                <button class="btn btn-secondary" onclick="showStep(1)">← Volver</button>
            </div>

            <div class="screen" id="s3">
                <div class="meta">
                    <span id="matriculaDisplay2"></span> | <span id="estadoDisplay"></span>
                </div>
                <textarea class="textarea" id="contenidoInput" placeholder="Observaciones o descripción..."></textarea>
                <button class="btn btn-primary" id="btnRegistrar">✓ Finalizar Registro</button>
                <button class="btn btn-secondary" onclick="showStep(2)">← Volver</button>
            </div>
        </div>
    </section>

    <section style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-secondary" id="genPdf" style="flex: 1;">📄 Generar PDF</button>
        <button class="btn btn-secondary danger" id="clearAll" style="flex: 1; position: relative; color: var(--danger);">
            <div id="clearHoldBar"></div>
            🗑 Limpiar Todo
        </button>
    </section>

    <section class="pills">
        <div class="pill" id="pillTotal"><div class="pill-inner"><span>Total</span> <span class="val" id="totalCount">0</span></div></div>
        <div class="pill" id="pillAveriadas"><div class="pill-inner"><span>Averías</span> <span class="val" id="averiadasCount">0</span></div></div>
    </section>

    <section class="compact">
        <div style="padding: 16px;">
            <div class="segment">
                <button class="active" onclick="filterTab('TODAS', this)">Todas</button>
                <button onclick="filterTab('CARGADA', this)">Cargadas</button>
                <button onclick="filterTab('VACÍA', this)">Vacías</button>
                <button onclick="filterTab('AVERIADA', this)">Averiadas</button>
            </div>
            <input id="searchInput" class="input" placeholder="🔍 Buscar matrícula..." style="margin-bottom: 16px;"/>
            <div id="recordsContainer"></div>
        </div>
    </section>
</div>

<div class="modal" id="editModal">
    <div class="modal-card">
        <h3>Editar Registro</h3><br>
        <input class="input" id="editMatricula" style="margin-bottom: 10px;">
        <select id="editEstado" style="margin-bottom: 10px;">
            <option value="CARGADA">CARGADA</option>
            <option value="VACÍA">VACÍA</option>
            <option value="AVERIADA">AVERIADA</option>
        </select>
        <textarea class="textarea" id="editContenido" style="margin-bottom: 15px;"></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="closeEditModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="saveEdit()">Guardar</button>
        </div>
    </div>
</div>

<script>
    /* ══════════════════════════════════════════
       STATE & CORE
    ══════════════════════════════════════════ */
    let plataformas = JSON.parse(localStorage.getItem('xpo-data') || '[]');
    let step = 1;
    let currentMatricula = '';
    let currentEstado = '';
    let editingId = null;
    let activeTab = 'TODAS';

    const $ = id => document.getElementById(id);

    function toast(txt) {
        const el = $('dynamicIsland');
        el.textContent = txt;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    /* ══════════════════════════════════════════
       NAVIGATION
    ══════════════════════════════════════════ */
    function showStep(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.step-pip').forEach((p, i) => {
            p.classList.toggle('active', i+1 === n);
            p.classList.toggle('done', i+1 < n);
        });
        
        $('s' + n).classList.add('active');
        $('conn1').style.width = n > 1 ? '100%' : '0%';
        $('conn2').style.width = n > 2 ? '100%' : '0%';
        
        step = n;
        if(n === 1) $('matriculaInput').focus();
        if(n === 3) $('contenidoInput').focus();
    }

    $('toS2').onclick = () => {
        const val = $('matriculaInput').value.trim().toUpperCase();
        if(!val) { $('matriculaInput').classList.add('error'); return; }
        currentMatricula = val;
        $('matriculaDisplay').textContent = val;
        $('matriculaDisplay2').textContent = val;
        showStep(2);
    };

    function chooseEstado(est) {
        currentEstado = est;
        $('estadoDisplay').textContent = est;
        if(est === 'VACÍA') {
            finalizarRegistro(""); // Las vacías suelen no llevar descripción
        } else {
            showStep(3);
        }
    }

    $('btnRegistrar').onclick = () => {
        const desc = $('contenidoInput').value.trim();
        finalizarRegistro(desc);
    };

    function finalizarRegistro(desc) {
        const entry = {
            id: Date.now(),
            matricula: currentMatricula,
            estado: currentEstado,
            contenido: desc,
            timestamp: new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})
        };
        plataformas.push(entry);
        saveAndRefresh();
        resetFlow();
        toast("✅ Registro guardado");
    }

    function resetFlow() {
        $('matriculaInput').value = "";
        $('contenidoInput').value = "";
        showStep(1);
    }

    /* ══════════════════════════════════════════
       DATA MANAGEMENT
    ══════════════════════════════════════════ */
    function saveAndRefresh() {
        localStorage.setItem('xpo-data', JSON.stringify(plataformas));
        render();
    }

    function render() {
        const container = $('recordsContainer');
        const query = $('searchInput').value.toLowerCase();
        
        let filtered = plataformas.slice().reverse();
        if(activeTab !== 'TODAS') filtered = filtered.filter(p => p.estado === activeTab);
        if(query) filtered = filtered.filter(p => p.matricula.toLowerCase().includes(query));

        $('totalCount').textContent = plataformas.length;
        $('averiadasCount').textContent = plataformas.filter(p => p.estado === 'AVERIADA').length;
        
        // Update pills fills
        const total = plataformas.length || 1;
        $('pillTotal').style.setProperty('--fill', '100%');
        $('pillAveriadas').style.setProperty('--fill', (plataformas.filter(p=>p.estado==='AVERIADA').length/total*100)+'%');

        container.innerHTML = filtered.map(p => `
            <div class="record" data-estado="${p.estado}" onclick="openEdit(${p.id})">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>${p.matricula}</strong>
                    <span style="font-size:11px; color:var(--muted)">${p.timestamp}</span>
                </div>
                <div style="font-size:13px; color:var(--muted); margin-top:4px;">
                    ${p.estado} ${p.contenido ? '· ' + p.contenido : ''}
                </div>
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:var(--sub)">Sin registros</p>';
    }

    function filterTab(tab, btn) {
        activeTab = tab;
        document.querySelectorAll('.segment button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    $('searchInput').oninput = render;

    /* ══════════════════════════════════════════
       EDIT & DELETE
    ══════════════════════════════════════════ */
    window.openEdit = (id) => {
        const p = plataformas.find(x => x.id === id);
        if(!p) return;
        editingId = id;
        $('editMatricula').value = p.matricula;
        $('editEstado').value = p.estado;
        $('editContenido').value = p.contenido;
        $('editModal').classList.add('open');
    };

    window.closeEditModal = () => $('editModal').classList.remove('open');

    window.saveEdit = () => {
        const idx = plataformas.findIndex(x => x.id === editingId);
        plataformas[idx].matricula = $('editMatricula').value.toUpperCase();
        plataformas[idx].estado = $('editEstado').value;
        plataformas[idx].contenido = $('editContenido').value;
        saveAndRefresh();
        closeEditModal();
        toast("Actualizado");
    };

    /* ══════════════════════════════════════════
       CLEAR HOLD LOGIC
    ══════════════════════════════════════════ */
    let holdTimer;
    $('clearAll').onmousedown = $('clearAll').ontouchstart = (e) => {
        let p = 0;
        holdTimer = setInterval(() => {
            p += 5;
            $('clearHoldBar').style.width = p + '%';
            if(p >= 100) {
                clearInterval(holdTimer);
                plataformas = [];
                saveAndRefresh();
                toast("Papelera vaciada");
                $('clearHoldBar').style.width = '0%';
            }
        }, 50);
    };
    $('clearAll').onmouseup = $('clearAll').onmouseleave = $('clearAll').ontouchend = () => {
        clearInterval(holdTimer);
        $('clearHoldBar').style.width = '0%';
    };

    /* ══════════════════════════════════════════
       PDF (Refined)
    ══════════════════════════════════════════ */
    $('genPdf').onclick = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(20);
        doc.setTextColor(227, 6, 19); // Rojo XPO
        doc.text("XPO LOGISTICS", 105, 20, {align: 'center'});
        
        doc.setFontSize(12);
        doc.setTextColor(100);
        doc.text("Informe Diario de Plataformas - " + new Date().toLocaleDateString(), 105, 30, {align: 'center'});
        
        let y = 45;
        doc.setFontSize(10);
        doc.setTextColor(0);
        
        // Header tabla
        doc.setFillColor(240);
        doc.rect(10, y-5, 190, 8, 'F');
        doc.text("MATRÍCULA", 15, y);
        doc.text("ESTADO", 60, y);
        doc.text("HORA", 100, y);
        doc.text("OBSERVACIONES", 130, y);
        
        y += 10;
        plataformas.forEach(p => {
            if(y > 280) { doc.addPage(); y = 20; }
            doc.text(p.matricula, 15, y);
            doc.text(p.estado, 60, y);
            doc.text(p.timestamp, 100, y);
            doc.text(p.contenido.substring(0, 35), 130, y);
            y += 8;
        });

        doc.save("XPO_Reporte.pdf");
    };

    // Inicialización
    window.onload = render;
    window.onscroll = () => document.body.classList.toggle('scrolled', window.scrollY > 50);
</script>
